<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dunk SB — Nike Mini Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="logo">NIKE<span class="swoosh">®</span></div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="dunk.html" class="active">Dunk SB</a>
        <a href="jordan.html">Jordan 1</a>
        <a href="travis.html">Travis Collab</a>
        <a href="airforce.html">Air Force 1</a>
        <a href="cart.html" class="cart-link">Cart (<span id="cart-count">0</span>)</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="products container">
      <h2>Dunk SB Collection</h2>
      <div class="grid">

        <div class="product-card">
          <img src="images/dunk/1.jpg" alt="Dunk Tiffany">
          <h3>Dunk Tiffany</h3>
          <p class="price">250</p>
          <button class="btn add-to-cart" data-id="dunk-1" data-name="Dunk Tiffany" data-price="250">Add to Cart</button>
        </div>

        <div class="product-card">
          <img src="images/dunk/2.jpg" alt="Dunk Purple">

        <div class="product-card">
          <img src="images/dunk/3.jpg" alt="Dunk Green">

          <button class="btn add-to-cart" data-id="dunk-3" data-name="Dunk Green" data-price="200">Add to Cart</button>

        <div class="product-card">

        <div class="product-card">
          <img src="images/dunk/6.jpg" alt="Dunk Black">
          <h3>Dunk Black</h3>
          <p class="price">190</p>
          <button class="btn add-to-cart" data-id="dunk-6" data-name="Dunk Black" data-price="190">Add to Cart</button>
        </div>

        <div class="product-card">
          <img src="images/dunk/7.jpg" alt="Dunk White">
          <h3>Dunk White</h3>
          <p class="price">180</p>
          <button class="btn add-to-cart" data-id="dunk-7" data-name="Dunk White" data-price="180">Add to Cart</button>

        <div class="product-card">
          <img src="images/dunk/8.jpg" alt="Dunk Brown">

          <img src="images/dunk/9.jpg" alt="Dunk Yellow">

          <p class="price">215</p>
          <button class="btn add-to-cart" data-id="dunk-9" data-name="Dunk Yellow" data-price="215">Add to Cart</button>
        </div>

        <div class="product-card">
          <img src="images/dunk/10.jpg" alt="Dunk Special">
          <h3>Dunk Special</h3>
          <p class="price">300</p>
          <button class="btn add-to-cart" data-id="dunk-10" data-name="Dunk Special" data-price="300">Add to Cart</button>
        </div>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year-dunk"></span> Nike Mini Store</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
  <script src="js/script.js"></script>
<audio id="myAudio" autoplay loop muted>
    <source src="THANK GOD - Travis Scott (320).mp3" type="audio/mpeg">
</audio>

<script>
    const audio = document.getElementById("myAudio");
    audio.muted = false
</script>
