<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Air Force 1 — Nike Mini Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="logo">NIKE<span class="swoosh">®</span></div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="dunk.html">Dunk SB</a>
        <a href="jordan.html">Jordan 1</a>
        <a href="travis.html">Travis Collab</a>
        <a href="airforce.html" class="active">Air Force 1</a>
        <a href="cart.html" class="cart-link">Cart (<span id="cart-count">0</span>)</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="products container">
      <h2>Air Force 1 Collection</h2>
      <div class="grid">

        <div class="product-card">
          <img src="images/airforce/1.jpg" alt="AF1 White">
          <h3>AF1 White</h3>
          <p class="price">140</p>
          <button class="btn add-to-cart" data-id="af1-1" data-name="AF1 White" data-price="140">Add to Cart</button>
        </div>

        <div class="product-card">
          <img src="images/airforce/2.jpg" alt="AF1 Black">
          <h3>AF1 Black</h3>
          <p class="price">150</p>
          <button class="btn add-to-cart" data-id="af1-2" data-name="AF1 Black" data-price="150">Add to Cart</button>
        </div>

        <div class="product-card">
          <img src="images/airforce/3.jpg" alt="AF1 Low">
          <h3>AF1 Low</h3>
          <p class="price">130</p>
          <button class="btn add-to-cart" data-id="af1-3" data-name="AF1 Low" data-price="130">Add to Cart</button>
        </div>

        <div class="product-card">
          <img src="images/airforce/4.jpg" alt="AF1 Special">
          <h3>AF1 Special</h3>
          <p class="price">170</p>
          <button class="btn add-to-cart" data-id="af1-4" data-name="AF1 Special" data-price="170">Add to Cart</button>
        </div>

        <div class="product-card">
          <img src="images/airforce/5.jpg" alt="AF1 Canvas">
          <h3>AF1 Canvas</h3>
          <p class="price">160</p>
          <button class="btn add-to-cart" data-id="af1-5" data-name="AF1 Canvas" data-price="160">Add to Cart</button>
        </div>

        <div class="product-card">
          <img src="images/airforce/6.jpg" alt="AF1 Low 2">
          <h3>AF1 Low 2</h3>
          <p class="price">135</p>
          <button class="btn add-to-cart" data-id="af1-6" data-name="AF1 Low 2" data-price="135">Add to Cart</button>
        </div>

        <div class="product-card">
          <img src="images/airforce/7.jpg" alt="AF1 Premium">
          <h3>AF1 Premium</h3>
          <p class="price">190</p>
          <button class="btn add-to-cart" data-id="af1-7" data-name="AF1 Premium" data-price="190">Add to Cart</button>
        </div>

        <div class="product-card">
          <img src="images/airforce/8.jpg" alt="AF1 Utility">
          <h3>AF1 Utility</h3>
          <p class="price">175</p>
          <button class="btn add-to-cart" data-id="af1-8" data-name="AF1 Utility" data-price="175">Add to Cart</button>
        </div>

        <div class="product-card">
          <img src="images/airforce/9.jpg" alt="AF1 Low Special">
          <h3>AF1 Low Special</h3>
          <p class="price">155</p>
          <button class="btn add-to-cart" data-id="af1-9" data-name="AF1 Low Special" data-price="155">Add to Cart</button>
        </div>

        <div class="product-card">
          <img src="images/airforce/10.jpg" alt="AF1 Custom">
          <h3>AF1 Custom</h3>
          <p class="price">210</p>
          <button class="btn add-to-cart" data-id="af1-10" data-name="AF1 Custom" data-price="210">Add to Cart</button>
        </div>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year-af1"></span> Nike Mini Store</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
<audio id="myAudio" autoplay loop muted>
    <source src="THANK GOD - Travis Scott (320).mp3" type="audio/mpeg">
</audio>

<script>
    const audio = document.getElementById("myAudio");
    audio.muted = false
</script>

</body>
</html>
